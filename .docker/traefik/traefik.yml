global:
  sendAnonymousUsage: false
providers:
  docker:
    network: peniti
    exposedByDefault: false
    endpoint: "unix:///var/run/docker.sock"
    constraints: "Label(`traefik.constraint-label`,`public`)"
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
          permanent: true
  https:
    address: ":443"
api:
  dashboard: true
accessLog: { }
